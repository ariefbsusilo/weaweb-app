[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[build.env]
NIXPACKS_NODE_VERSION = "20"

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"

[env]
NODE_ENV = "production"
NEXT_PUBLIC_APP_URL = "https://${RAILWAY_PUBLIC_DOMAIN}"
DATABASE_URL = "file:/app/data/prod.db"
